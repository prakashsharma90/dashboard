<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Salarite</title>
    <link rel="stylesheet" href="auth-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="brand"><span>S</span> Salarite</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your Salarite workspace</p>

        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" id="btn-login">Login</button>
        </form>
    </div>

    <div class="toaster" id="toaster"></div>
    <script src="auth.js"></script>
</body>
</html>
