<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory | Salarite Employer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    
    <link rel="stylesheet" href="dashboard-style.css">
    <style>
        .main-content { padding: 2.5rem; max-width: 1440px; margin: 0 auto; width: 100%; height: 100vh; overflow-y: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .page-title { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin: 0; }
        .panel { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        
        /* Modal Style Override */
        #add-employee-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .main-content {
                height: auto !important;
                overflow-y: visible !important;
                padding: 15px !important;
                padding-top: 80px !important;
                padding-bottom: 60px !important;
            }
            .page-header { flex-direction: column; align-items: flex-start; gap: 15px; margin-bottom: 1.5rem; }
            .page-header > div { width: 100%; }
            .page-header button { width: 100%; justify-content: center; }
            
            /* Force pagination and info to be visible on mobile */
            .dataTables_info, .dataTables_paginate { width: 100% !important; text-align: center !important; position: sticky; left: 0; right: 0; display: block !important; margin: 15px auto !important; }
            .dataTables_wrapper .dataTables_paginate .paginate_button { 
                padding: 8px 14px !important; 
                margin: 4px !important; 
                font-size: 0.8rem !important; 
                background: #f1f5f9 !important; 
                border-color: #e2e8f0 !important; 
                border-radius: 8px !important;
                display: inline-block !important;
            }
            .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: #4D4286 !important; color: white !important; font-weight: bold; }
            
            .dataTables_wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; display: block; width: 100%; padding-bottom: 20px; }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- SIDEBAR (AUTO-THEMED BY dashboard-style.css) -->
        <div id="sidebar-placeholder"></div>
        <script src="employer-sidebar.js"></script>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Employee Directory</h1>
                <div style="display: flex; gap: 12px;">
                    <button class="btn-outline" style="background: white; border: 1px solid #e2e8f0; padding: 10px 18px; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="download" style="width: 18px;"></i> Export CSV
                    </button>
                    <button class="btn-primary" id="btn-open-add-modal" style="background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="plus" style="width: 18px;"></i> Add New Employee
                    </button>
                </div>
            </div>

            <!-- PRIORITY VERIFICATION LIST (SHOWN ONLY IF PENDING) -->
            <div id="verification-panel" class="panel" style="display:none; border:2px solid #4D4286; background:#f5f3ff; margin-bottom:24px;">
                <div class="panel-header" style="margin-bottom:15px; display: flex; justify-content: space-between; align-items: center;">
                    <h3 class="panel-title" style="color:#4D4286; display:flex; align-items:center; gap:8px; font-weight: 800; font-size: 1.1rem;">
                        <i data-lucide="shield-alert" style="width:20px;"></i> Needs Your Verification
                    </h3>
                    <span class="status-badge" style="background:#4D4286; color:white; border-radius:12px; padding: 4px 12px; font-size: 0.75rem;">Action Needed</span>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table" id="verification-table">
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Submission Status</th>
                                <th>Review Docs</th>
                                <th>Quick Actions</th>
                            </tr>
                        </thead>
                        <tbody id="verification-table-body">
                            <!-- Populated dynamically via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="panel">

                <div style="overflow-x: auto;">
                    <table class="data-table" id="employee-table">
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>ID</th>
                                <th>Department</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="employee-table-body">
                            <!-- Populated dynamically via employer-dashboard.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Employee Modal -->
    <div id="add-employee-modal" style="display: none;">
        <div style="background: white; padding: 32px; border-radius: 20px; width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);">
            <h2 style="margin: 0 0 24px; font-size: 1.4rem; font-weight: 800; color: #1e293b; font-family: 'Plus Jakarta Sans', sans-serif;">Create Employee Account</h2>
            <form id="add-employee-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="add-fname" required class="form-input" placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="add-lname" required class="form-input" placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="add-email" required class="form-input" placeholder="john.doe@company.com">
                </div>
                <div class="form-group">
                    <label>Set Permanent Password</label>
                    <input type="text" id="add-password" required minlength="6" class="form-input" placeholder="Min. 6 chars">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Employee ID</label>
                        <input type="text" id="add-empid" required class="form-input" placeholder="EMP-1001">
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" id="add-dept" required class="form-input" placeholder="Engineering">
                    </div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end;">
                    <button type="button" class="btn-outline" id="btn-close-modal" style="background: white; border: 1px solid #e2e8f0; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer;">Cancel</button>
                    <button type="submit" class="btn-primary" id="btn-submit-employee" style="background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer;">Initialize Employee</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Employee Verification Document Modal (REDESIGNED) -->
    <div id="verify-doc-modal"
        style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center;">
        <div
            style="background: white; border-radius: 20px; width: 1000px; max-width: 95%; max-height: 92vh; display: flex; flex-direction: column; box-shadow: 0 40px 100px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);">


            <!-- Modal Header -->
            <div
                style="display: flex; justify-content: space-between; align-items: center; padding: 20px 28px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div
                        style="width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#10b981,#059669); display:flex; align-items:center; justify-content:center;">
                        <i data-lucide="shield-check" style="width:20px; color:white;"></i>
                    </div>
                    <div>
                        <h3 style="font-size: 1.15rem; color: var(--text-main); margin:0;" id="verify-modal-title">
                            Profile Verification</h3>
                        <p style="font-size:0.8rem; color:var(--text-muted); margin:0;">Review submitted details before
                            approval</p>
                    </div>
                </div>
                <button type="button" class="btn-icon" id="btn-close-verify-modal"
                    style="width:32px; height:32px; border-radius:8px; border:1px solid #e2e8f0; display:flex; align-items:center; justify-content:center; cursor:pointer; background:white;">
                    <i data-lucide="x" style="width: 16px;"></i>
                </button>
            </div>

            <!-- Tab Navigation -->
            <div style="display:flex; gap:0; border-bottom:1px solid #e2e8f0; padding: 0 28px; flex-shrink:0; overflow-x:auto;"
                id="verify-tabs">
                <button class="verify-tab active" data-tab="personal"
                    style="padding:12px 18px; font-size:0.85rem; font-weight:600; border:none; background:none; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; white-space:nowrap;"
                    onclick="switchVerifyTab(this, 'personal')">
                    <i data-lucide="user" style="width:14px; vertical-align:middle; margin-right:4px;"></i> Personal
                </button>
                <button class="verify-tab" data-tab="address"
                    style="padding:12px 18px; font-size:0.85rem; font-weight:600; border:none; background:none; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; white-space:nowrap;"
                    onclick="switchVerifyTab(this, 'address')">
                    <i data-lucide="map-pin" style="width:14px; vertical-align:middle; margin-right:4px;"></i> Address
                </button>
                <button class="verify-tab" data-tab="employment"
                    style="padding:12px 18px; font-size:0.85rem; font-weight:600; border:none; background:none; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; white-space:nowrap;"
                    onclick="switchVerifyTab(this, 'employment')">
                    <i data-lucide="briefcase" style="width:14px; vertical-align:middle; margin-right:4px;"></i>
                    Employment
                </button>
                <button class="verify-tab" data-tab="bank"
                    style="padding:12px 18px; font-size:0.85rem; font-weight:600; border:none; background:none; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; white-space:nowrap;"
                    onclick="switchVerifyTab(this, 'bank')">
                    <i data-lucide="landmark" style="width:14px; vertical-align:middle; margin-right:4px;"></i> Bank
                </button>
                <button class="verify-tab" data-tab="documents"
                    style="padding:12px 18px; font-size:0.85rem; font-weight:600; border:none; background:none; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; white-space:nowrap;"
                    onclick="switchVerifyTab(this, 'documents')">
                    <i data-lucide="file-text" style="width:14px; vertical-align:middle; margin-right:4px;"></i>
                    Documents
                </button>
            </div>

            <!-- Scrollable Content -->
            <div style="flex: 1; overflow-y: auto; padding: 24px 28px;">
                <div id="verify-doc-content">
                    <!-- Dynamically filled by JS -->
                </div>

                <div id="verify-revision-box"
                    style="display:none; margin-top: 16px; background:#fffbeb; padding:16px; border-radius:10px; border:1px solid #fde68a;">
                    <label style="display:block; font-weight:600; margin-bottom:8px; color:#92400e; font-size:0.9rem;">
                        <i data-lucide="message-square"
                            style="width:14px; vertical-align:middle; margin-right:4px;"></i>
                        Reason / Fields to Fix (Required):
                    </label>
                    <textarea id="verify-notes"
                        style="width:100%; height:80px; padding:12px; border:1px solid #fcd34d; border-radius:8px; outline:none; font-family:inherit; font-size:0.9rem; resize:vertical;"
                        placeholder="e.g. Bank IFSC code is incorrect, Aadhaar image is blurry — please re-upload."></textarea>
                </div>
            </div>

            <!-- Modal Footer Actions -->
            <div
                style="display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid #e2e8f0; padding: 16px 28px; flex-shrink:0; background:#fafafa; border-radius: 0 0 16px 16px;">
                <input type="hidden" id="verify-emp-id">
                <button class="btn-primary" id="btn-verify-approve"
                    style="background: linear-gradient(135deg,#10b981,#059669); border:none; padding:10px 20px; border-radius:8px; color:white; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:0.875rem;">
                    <i data-lucide="check-circle" style="width:16px;"></i> Approve
                </button>
                <button class="btn-primary" id="btn-verify-revise"
                    style="background: linear-gradient(135deg,#f59e0b,#d97706); border:none; padding:10px 20px; border-radius:8px; color:white; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:0.875rem;">
                    <i data-lucide="edit-3" style="width:16px;"></i> Request Revision
                </button>
                <button class="btn-primary" id="btn-verify-reject"
                    style="background: linear-gradient(135deg,#ef4444,#dc2626); border:none; padding:10px 20px; border-radius:8px; color:white; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:0.875rem;">
                    <i data-lucide="x-circle" style="width:16px;"></i> Reject
                </button>
                <button class="btn-primary" id="btn-verify-reject-confirm"
                    style="display:none; background: linear-gradient(135deg,#ef4444,#dc2626); border:none; padding:10px 20px; border-radius:8px; color:white; font-weight:600; cursor:pointer; font-size:0.875rem;">
                    Confirm Rejection
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        function switchVerifyTab(tabEl, tabName) {
            document.querySelectorAll('.verify-tab').forEach(t => {
                t.style.color = 'var(--text-muted)';
                t.style.borderBottomColor = 'transparent';
                t.classList.remove('active');
            });
            tabEl.style.color = 'var(--brand-green)';
            tabEl.style.borderBottomColor = 'var(--brand-green)';
            tabEl.classList.add('active');
            document.querySelectorAll('.verify-tab-content').forEach(c => c.style.display = 'none');
            const target = document.getElementById('vtab-' + tabName);
            if (target) target.style.display = 'block';
        }
    </script>
    <script src="employer-dashboard.js"></script>
    <script>
        $(document).ready(function() {
            initEmployerDashboard();
        });
    </script>
</body>
</html>
