        try {
            const { data: employees, error } = await sb.from('employees').select('*');
            if (error) throw error;
            vhrEmployees = employees || [];
            renderVHRVerification();
            renderVHRDirectory();
        } catch(e) {
            console.error('VHR Employee fetch error:', e);
            // Fallback: render demo only
            vhrEmployees = [];
            renderVHRVerification();
            renderVHRDirectory();
        }
    }

    // --- RENDER VERIFICATION PANEL ---
    function renderVHRVerification() {
        const tbody = $('#vhr-verification-tbody');
        tbody.empty();
        const pending = vhrEmployees.filter(e => e.verification_status === 'Pending');

        if (pending.length === 0) {
            $('#vhr-verify-panel').hide();
            return;
        }
        $('#vhr-verify-panel').show();
        $('#vhr-verify-count').text(pending.length + ' Action Needed');

        pending.forEach(emp => {
            const photo = emp.profile_photo_url || `https://ui-avatars.com/api/?name=${emp.first_name}+${emp.last_name || ''}&background=e2e8f0`;
            tbody.append(`
                <tr>
                    <td>
                        <div class="employee-col">

    // --- RENDER EMPLOYEE DIRECTORY (DataTables) ---
    function renderVHRDirectory() {
        const tbody = $('#vhr-emp-directory-tbody');
        tbody.empty();

        // Destroy old DataTable instance if any
        if ($.fn.DataTable.isDataTable('#vhr-emp-directory-table')) {
            $('#vhr-emp-directory-table').DataTable().destroy();
        }

        const allEmps = [...vhrEmployees, ...demoEmps];

        allEmps.forEach(emp => {
            const photo = emp.profile_photo_url || `https://ui-avatars.com/api/?name=${emp.first_name}+${emp.last_name || ''}&background=e2e8f0`;
            const email = emp.email || `${emp.first_name.toLowerCase()}.${(emp.last_name || '').toLowerCase() || 'user'}@tempmail.com`;

            tbody.append(`
                <tr>
                    <td>
                        <div class="employee-col">
                            <img src="${photo}" alt="${esc(emp.first_name)}">
                            <div>
                                <span class="name">${esc(emp.first_name)} ${esc(emp.last_name || '')}</span>
                                <span class="email">${esc(email)}</span>
                            </div>
                        </div>
                    </td>
                    <td>${esc(emp.emp_id || '-')}</td>
                    <td>${esc(emp.department || 'Unassigned')}</td>
                    <td>${esc(emp.designation || 'Employee')}</td>
                    <td><span class="status-active">Active</span></td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon" title="View"><i data-lucide="eye" style="width:16px;"></i></button>
                            <button class="btn-icon" title="Edit"><i data-lucide="edit-2" style="width:16px;"></i></button>
                        </div>
                    </td>
                </tr>
            `);
        });

        // Init DataTable
        $('#vhr-emp-directory-table').DataTable({
            paging: true,
            searching: true,
            info: true,
            lengthChange: false,
            pageLength: 50,
            language: {
                search: "",
                searchPlaceholder: "Search employees...",
                emptyTable: "No employees found."
            },
            destroy: true
        });

        lucide.createIcons();
    }

    // --- ADD EMPLOYEE MODAL ---
    $('#vhr-btn-add-emp').on('click', function() {
        $('#vhr-add-emp-modal').css('display', 'flex');
    });
    $('#vhr-btn-close-modal').on('click', function() {
        $('#vhr-add-emp-modal').hide();
    });

    $('#vhr-add-emp-form').on('submit', async function(e) {
        e.preventDefault();
        const btn = $('#vhr-btn-submit-emp');
        btn.text('Creating...').prop('disabled', true);
        try {
            const email = $('#vhr-add-email').val();
            const password = $('#vhr-add-password').val();
            const fname = $('#vhr-add-fname').val();
            const lname = $('#vhr-add-lname').val();
            const empid = $('#vhr-add-empid').val();
            const dept = $('#vhr-add-dept').val();

            const { data, error } = await sb.rpc('admin_create_employee', {
                p_email: email, p_password: password, p_first_name: fname,
                p_last_name: lname, p_emp_id: empid, p_department: dept
            });
            if (error) {
                if (error.message.includes("already in use")) throw new Error("This email address is already taken.");
                throw error;
            }

            alert(`Employee ${fname} ${lname} created successfully!`);
            $('#vhr-add-emp-modal').hide();
            $('#vhr-add-emp-form')[0].reset();
            initVHREmployees(); // Refresh
        } catch(err) {
            console.error('Create employee error:', err);
            alert('Error: ' + err.message);
        } finally {
            btn.text('Initialize Employee').prop('disabled', false);
        }
    });

    // --- VERIFICATION DOCUMENT VIEWER ---
    $(document).on('click', '.btn-verify-docs', function() {
        const empId = $(this).data('id');
        const emp = vhrEmployees.find(e => e.id === empId);
        if (!emp) return;

        $('#vhr-verify-emp-id').val(emp.id);
        $('#vhr-verify-modal-title').text(`Verify: ${emp.first_name || ''} ${emp.last_name || ''}`);
        $('#vhr-verify-notes').val('');

        const row = (label, value, icon='minus') => {
            const val = value ? `<span style="font-weight:600; color:#1e293b;">${value}</span>` : `<span style="color:#94a3b8; font-style:italic;">Not provided</span>`;
            return `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f1f5f9;">
                <span style="color:#64748b; font-size:0.85rem; display:flex; align-items:center; gap:6px;"><i data-lucide="${icon}" style="width:15px;"></i>${label}</span>
                ${val}
            </div>`;
        };

        const docCard = (label, url, icon='file-text') => {
            if (!url) return `<div style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:#f8fafc; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:10px; opacity:0.6;">
                <span style="display:flex; align-items:center; gap:10px; color:#64748b; font-size:0.85rem;"><i data-lucide="${icon}" style="width:16px;"></i> ${label}</span>
                <span style="color:#94a3b8; font-style:italic; font-size:0.75rem;">Not provided</span>
            </div>`;
            return `<div style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:white; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:10px;">
                <span style="display:flex; align-items:center; gap:10px; font-weight:600; color:#1e293b; font-size:0.85rem;"><i data-lucide="image" style="width:16px; color:#554994;"></i> ${label}</span>
                <a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#554994; text-decoration:none; font-weight:700; font-size:0.8rem; padding:6px 14px; border:1px solid #554994; border-radius:6px;">View Full</a>
            </div>`;
        };

        const photoUrl = emp.doc_photo_url || emp.profile_photo_url;
        const photoPreview = photoUrl ? `<div style="text-align:center; margin-bottom:16px;"><img src="${photoUrl}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #e2e8f0;"></div>` : '';

        const fmtAddr = (l1,l2,pin,city,state) => { const parts = [l1,l2,city,state].filter(Boolean); return parts.length > 0 ? `${parts.join(', ')}${pin ? ' - '+pin : ''}` : null; };
        const curAddr = fmtAddr(emp.current_address_line1, emp.current_address_line2, emp.current_pincode, emp.current_city, emp.current_state);
        const permAddr = fmtAddr(emp.permanent_address_line1, emp.permanent_address_line2, emp.permanent_pincode, emp.permanent_city, emp.permanent_state);

        $('#vhr-verify-doc-content').html(`
            <div class="vhr-vtab-content" id="vhr-vtab-personal" style="display:block;">
                ${photoPreview}
                <div style="background:#f8fafc; border-radius:12px; padding:4px 20px; border:1px solid #e2e8f0;">
                    ${row('Employee ID', emp.emp_id, 'hash')}
                    ${row('Full Name', `${emp.first_name||''} ${emp.last_name||''}`.trim(), 'user')}
                    ${row('Phone', emp.contact_number, 'phone')}
                    ${row('Gender', emp.gender, 'users')}
                    ${row('Date of Birth', emp.date_of_birth, 'calendar')}
                    ${row('Marital Status', emp.marital_status, 'heart')}
                </div>
            </div>
            <div class="vhr-vtab-content" id="vhr-vtab-address" style="display:none;">
                <h4 style="font-size:0.9rem; margin:0 0 10px;">Current Address</h4>
                <div style="background:#f8fafc; border-radius:12px; padding:16px 20px; border:1px solid #e2e8f0; margin-bottom:16px; font-size:0.9rem;">${curAddr || '<span style="color:#94a3b8;">Not provided</span>'}</div>
                <h4 style="font-size:0.9rem; margin:0 0 10px;">Permanent Address</h4>
                <div style="background:#f8fafc; border-radius:12px; padding:16px 20px; border:1px solid #e2e8f0; font-size:0.9rem;">${permAddr || '<span style="color:#94a3b8;">Not provided</span>'}</div>
            </div>
            <div class="vhr-vtab-content" id="vhr-vtab-employment" style="display:none;">
                <div style="background:#f8fafc; border-radius:12px; padding:4px 20px; border:1px solid #e2e8f0;">
                    ${row('Department', emp.department, 'building')}
                    ${row('Designation', emp.designation, 'award')}
                    ${row('Reporting Manager', emp.reporting_manager, 'user-check')}
                    ${row('Employment Type', emp.employment_type, 'clock')}
                    ${row('Date of Joining', emp.joining_date, 'calendar')}
                    ${row('Work Location', emp.work_location, 'map')}
                </div>
            </div>
            <div class="vhr-vtab-content" id="vhr-vtab-bank" style="display:none;">
                <div style="background:#eef2ff; border-radius:12px; padding:4px 20px; border:1px solid #e0e7ff;">
                    ${row('Bank Name', emp.bank_name, 'landmark')}
                    ${row('Account Holder', emp.bank_holder_name, 'user')}
                    ${row('Account Number', emp.bank_account_number, 'credit-card')}
                    ${row('IFSC Code', emp.bank_ifsc, 'key')}
                    ${row('Branch', emp.bank_branch, 'git-branch')}
                </div>
            </div>
            <div class="vhr-vtab-content" id="vhr-vtab-documents" style="display:none;">
                ${docCard('Aadhaar Card', emp.doc_aadhaar_url, 'file-badge')}
                ${docCard('PAN Card', emp.doc_pan_url, 'file-badge-2')}
                ${docCard('Resume / CV', emp.doc_resume_url, 'file-text')}
                ${docCard('Passport Photo', emp.doc_photo_url || emp.profile_photo_url, 'image')}
                ${docCard('Offer Letter', emp.doc_offer_url, 'file-check')}
            </div>
        `);

        const firstTab = document.querySelector('.vhr-vtab[data-tab="personal"]');
        if (firstTab) vhrSwitchVerifyTab(firstTab, 'personal');
        lucide.createIcons();
        $('#vhr-verify-revision-box').hide();
        $('#vhr-verify-doc-modal').css('display', 'flex');
    });

    // Close verify modal
    $('#vhr-btn-close-verify').on('click', function() {
        $('#vhr-verify-doc-modal').hide();
    });

    // Approve / Reject / Revise actions
    $('#vhr-btn-verify-approve').on('click', async function() {
        const empId = $('#vhr-verify-emp-id').val();
        if (!empId) return;
        try {
            await sb.from('employees').update({ verification_status: 'Active', profile_completed: true }).eq('id', empId);
            alert('Profile approved successfully!');
            $('#vhr-verify-doc-modal').hide();
            initVHREmployees();
        } catch(e) { alert('Error: ' + e.message); }
    });

    $('#vhr-btn-verify-reject').on('click', function() {
        $('#vhr-verify-revision-box').slideDown();
    });

    $('#vhr-btn-verify-revise').on('click', async function() {
        const empId = $('#vhr-verify-emp-id').val();
        const notes = $('#vhr-verify-notes').val();
        if (!empId) return;
        try {
            await sb.from('employees').update({ verification_status: 'Revision Required', verification_notes: notes }).eq('id', empId);
            alert('Revision request sent.');
            $('#vhr-verify-doc-modal').hide();
            initVHREmployees();
        } catch(e) { alert('Error: ' + e.message); }
    });

    // Quick approve from panel
    $(document).on('click', '.btn-verify-quick', async function() {
        const empId = $(this).data('id');
        try {
            $(this).html('Approving...');
            await sb.from('employees').update({ verification_status: 'Active', profile_completed: true }).eq('id', empId);
            initVHREmployees();
        } catch(e) { alert('Error: ' + e.message); }
    });

    // Boot
    initVHREmployees();
    lucide.createIcons();
})();

// Tab switching (global scope for onclick)
function vhrSwitchVerifyTab(tabEl, tabName) {
    document.querySelectorAll('.vhr-vtab').forEach(t => {
        t.style.color = '#94a3b8';
        t.style.borderBottomColor = 'transparent';
        t.classList.remove('active');
    });
    tabEl.style.color = '#554994';
    tabEl.style.borderBottomColor = '#554994';
    tabEl.classList.add('active');
    document.querySelectorAll('.vhr-vtab-content').forEach(c => c.style.display = 'none');
    const target = document.getElementById('vhr-vtab-' + tabName);
    if (target) target.style.display = 'block';
}
</script>
</div>
