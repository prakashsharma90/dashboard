<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Account - Salarite</title>
    <link rel="stylesheet" href="auth-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="brand"><span>S</span> Salarite</div>
        
        <div class="progress-container">
            <div class="step active">1</div>
            <div class="step">2</div>
            <div class="step">3</div>
        </div>

        <h2>Set Your Password</h2>
        <p class="subtitle" id="welcome-text">Activate your account to access your employee dashboard.</p>

        <form id="activate-form">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="At least 6 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                <div class="error-msg" id="pwd-error">Passwords do not match</div>
            </div>
            <button type="submit" class="btn-primary" id="btn-activate">Save & Continue</button>
        </form>
    </div>

    <div class="toaster" id="toaster"></div>
    <script src="auth.js"></script>
</body>
</html>
